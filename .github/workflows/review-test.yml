name: review-test

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number
        required: true
        type: string
      enable_auto_merge:
        description: Enable native auto-merge after approval
        required: true
        default: false
        type: boolean

permissions:
  pull-requests: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Show token permissions
        run: |
          echo "actor=$GITHUB_ACTOR"
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ inputs.pr }}
        run: |
          gh pr review "$PR" --approve --body "approval from github-actions[bot]"
      - name: Enable auto-merge
        if: ${{ inputs.enable_auto_merge }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ inputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          gh api graphql -f query='
            mutation($pr:ID!) {
              enablePullRequestAutoMerge(input:{pullRequestId:$pr, mergeMethod:SQUASH}) {
                pullRequest { number autoMergeRequest { enabledAt } }
              }
            }' -F pr="$(gh pr view "$PR" --repo "$REPO" --json id --jq .id)"
