name: review-test

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number
        required: true
        type: string
      enable_auto_merge:
        description: Enable native auto-merge after approval
        required: true
        default: false
        type: boolean

permissions:
  pull-requests: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Show token permissions
        run: |
          echo "actor=$GITHUB_ACTOR"
      - name: Add bug label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ inputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          gh api "repos/$REPO/issues/$PR/labels" -X POST -f labels[]="bug"
          echo "label_exit=$?"
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ inputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          gh pr review "$PR" --repo "$REPO" --approve --body "approval from github-actions[bot]"
          echo "approve_exit=$?"
      - name: Request reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ inputs.pr }}
          REPO: ${{ github.repository }}
          REVIEWER: qsq8t65pxs
        run: |
          set +e
          gh api "repos/$REPO/pulls/$PR/requested_reviewers" -X POST -f reviewers[]="$REVIEWER"
          echo "request_reviewer_exit=$?"
      - name: Update branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ inputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          gh api "repos/$REPO/pulls/$PR/update-branch" -X PUT
          echo "update_branch_exit=$?"
      - name: Enable auto-merge
        if: ${{ inputs.enable_auto_merge }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ inputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          gh api graphql -f query='
            mutation($pr:ID!) {
              enablePullRequestAutoMerge(input:{pullRequestId:$pr, mergeMethod:SQUASH}) {
                pullRequest { number autoMergeRequest { enabledAt } }
              }
            }' -F pr="$(gh pr view "$PR" --repo "$REPO" --json id --jq .id)"
          echo "auto_merge_exit=$?"
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ inputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
          echo "merge_exit=$?"
