name: artifact-pr

on:
  pull_request:

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show output tree
        run: |
          if [ -d output ]; then
            find output -maxdepth 2 -ls
          else
            echo "no output dir"
          fi
      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output/

