name: post-summaries-scratch

on:
  workflow_run:
    workflows:
      - artifact-pr
    types:
      - completed

jobs:
  comment:
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            const matchArtifact = artifacts.data.artifacts.find((artifact) => artifact.name === "output");
            if (!matchArtifact) {
              core.setFailed("output artifact not found");
              return;
            }
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: matchArtifact.id,
              archive_format: "zip",
            });
            require("fs").writeFileSync(`${process.env.GITHUB_WORKSPACE}/comment.zip`, Buffer.from(download.data));
      - name: Unzip
        run: unzip comment.zip
      - name: Comment body preview
        run: |
          ls -la
          sed -n '1,20p' comment.md || true
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const markdown = fs.readFileSync("./comment.md", "utf8");
            const prs = context.payload.workflow_run.pull_requests;
            if (fs.existsSync("./commentId")) {
              const commentId = Number(fs.readFileSync("./commentId", "utf8"));
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                body: markdown,
              });
              return;
            }
            if (!prs || prs.length === 0) {
              core.setFailed("no pull_request payload");
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prs[0].number,
              body: markdown,
            });
